<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Greeting App 🎉</title>
  <meta name="description"
    content="A fun greeting app — enter your name and get a personalized hello with a confetti blast!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       DESIGN SYSTEM — CSS CUSTOM PROPERTIES
    ============================================================ */
    :root {
      --bg-from: #0f0c29;
      --bg-mid: #302b63;
      --bg-to: #24243e;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.18);
      --accent: #a78bfa;
      --accent-2: #60a5fa;
      --text: #f1f0ff;
      --subtext: rgba(241, 240, 255, 0.6);
      --input-bg: rgba(255, 255, 255, 0.06);
      --radius: 16px;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(rgba(15, 12, 41, 0.7), rgba(48, 43, 99, 0.7)), url('background.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
      overflow-x: hidden;
    }

    /* ============================================================
       CONFETTI CANVAS (sits behind everything)
    ============================================================ */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ============================================================
       CARD — glassmorphism
    ============================================================ */
    .card {
      position: relative;
      z-index: 1;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 52px 44px 48px;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow);
      text-align: center;
      animation: fadeSlideIn 0.7s ease both;
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(32px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ============================================================
       EMOJI ICON
    ============================================================ */
    .emoji-icon {
      font-size: 56px;
      margin-bottom: 16px;
      display: block;
      animation: float 3s ease-in-out infinite;
      user-select: none;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    /* ============================================================
       HEADINGS
    ============================================================ */
    h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .subtitle {
      color: var(--subtext);
      font-size: 0.95rem;
      font-weight: 300;
      margin-bottom: 36px;
    }

    /* ============================================================
       FORM
    ============================================================ */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    label {
      text-align: left;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--subtext);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    #name-input {
      width: 100%;
      padding: 16px 20px;
      background: var(--input-bg);
      border: 1.5px solid var(--glass-border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    #name-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    #name-input:focus {
      border-color: var(--accent);
      background: rgba(167, 139, 250, 0.08);
      box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.2);
    }

    /* ============================================================
       SUBMIT BUTTON
    ============================================================ */
    #submit-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
      box-shadow: 0 4px 20px rgba(167, 139, 250, 0.4);
    }

    #submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(167, 139, 250, 0.55);
    }

    #submit-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    #submit-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    /* Loading spinner inside button */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2.5px solid rgba(255, 255, 255, 0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ============================================================
       GREETING RESULT BOX
    ============================================================ */
    #result-box {
      display: none;
      margin-top: 28px;
      padding: 20px 24px;
      border-radius: var(--radius);
      background: linear-gradient(135deg,
          rgba(167, 139, 250, 0.15),
          rgba(96, 165, 250, 0.12));
      border: 1px solid rgba(167, 139, 250, 0.35);
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.85);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    #result-box.visible {
      display: block;
    }

    #greeting-text {
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }

    #greeting-text .name-highlight {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ============================================================
       ERROR BOX
    ============================================================ */
    #error-box {
      display: none;
      margin-top: 20px;
      padding: 14px 18px;
      border-radius: var(--radius);
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.35);
      color: #fca5a5;
      font-size: 0.9rem;
      animation: popIn 0.4s ease both;
    }

    #error-box.visible {
      display: block;
    }

    /* ============================================================
       FOOTER NOTE
    ============================================================ */
    .footer-note {
      margin-top: 28px;
      font-size: 0.78rem;
      color: var(--subtext);
    }

    .footer-note code {
      background: rgba(255, 255, 255, 0.08);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.8em;
    }

    /* ============================================================
       RESPONSIVE
    ============================================================ */
    @media (max-width: 520px) {
      .card {
        padding: 40px 28px 36px;
      }

      h1 {
        font-size: 1.65rem;
      }
    }
  </style>
</head>

<body>

  <!-- Confetti lives here -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Main Card -->
  <main class="card" role="main">
    <span class="emoji-icon" aria-hidden="true">👋</span>

    <h1>Hello There!</h1>
    <p class="subtitle">Enter your name and we'll send you a special greeting ✨</p>

    <!-- Form -->
    <form id="greeting-form" novalidate>
      <div class="form-group">
        <label for="name-input">Your Name</label>
        <input type="text" id="name-input" placeholder="Enter your name" autocomplete="given-name" maxlength="60"
          aria-label="Enter your name" />
        <button type="submit" id="submit-btn">
          Submit
        </button>
      </div>
    </form>

    <!-- Greeting result -->
    <div id="result-box" role="alert" aria-live="polite">
      <p id="greeting-text"></p>
    </div>

    <!-- Error box -->
    <div id="error-box" role="alert" aria-live="assertive"></div>

    <!-- Beginner-friendly note about the backend -->
    <p class="footer-note">
      Powered by <code>Spring Boot</code> ✨
    </p>
  </main>

  <script>
    /* =============================================================
       CONFIGURATION
       Change BACKEND_URL if your backend runs on a different port.
    ============================================================= */
    const BACKEND_URL = 'https://greeting-1-czv1.onrender.com/api/greet';

    /* =============================================================
       DOM ELEMENTS
    ============================================================= */
    const form = document.getElementById('greeting-form');
    const nameInput = document.getElementById('name-input');
    const submitBtn = document.getElementById('submit-btn');
    const resultBox = document.getElementById('result-box');
    const greetingTxt = document.getElementById('greeting-text');
    const errorBox = document.getElementById('error-box');
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');

    /* =============================================================
       CONFETTI ENGINE
       Pure-canvas implementation — no external library needed!
    ============================================================= */
    let confettiParticles = [];
    let confettiAnimId = null;

    /** Resize canvas to fill the viewport */
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    /** Create a single confetti particle with random properties */
    function createParticle() {
      const colors = [
        '#a78bfa', '#60a5fa', '#f472b6', '#34d399',
        '#fbbf24', '#f87171', '#818cf8', '#2dd4bf'
      ];
      return {
        x: Math.random() * canvas.width,
        y: -10,
        w: Math.random() * 10 + 6,    // width
        h: Math.random() * 5 + 4,    // height
        color: colors[Math.floor(Math.random() * colors.length)],
        angle: Math.random() * Math.PI * 2,
        spin: (Math.random() - 0.5) * 0.2,
        vx: (Math.random() - 0.5) * 4, // horizontal velocity
        vy: Math.random() * 3 + 2,     // vertical velocity (falling)
        opacity: 1,
        decay: Math.random() * 0.004 + 0.002  // how quickly it fades
      };
    }

    /** Draw & update one animation frame */
    function tickConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      confettiParticles.forEach(p => {
        // Update position
        p.x += p.vx;
        p.y += p.vy;
        p.angle += p.spin;
        p.vy += 0.04; // gravity
        p.opacity -= p.decay;

        // Draw the confetti piece (rotated rectangle)
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });

      // Remove invisible / out-of-screen particles
      confettiParticles = confettiParticles.filter(
        p => p.opacity > 0 && p.y < canvas.height + 20
      );

      if (confettiParticles.length > 0) {
        confettiAnimId = requestAnimationFrame(tickConfetti);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        confettiAnimId = null;
      }
    }

    /**
     * Launch confetti!
     * @param {number} durationMs  How long to keep spawning particles (ms)
     * @param {number} rate        Particles spawned per frame
     */
    function launchConfetti(durationMs = 3500, rate = 8) {
      // Cancel any ongoing confetti
      if (confettiAnimId) {
        cancelAnimationFrame(confettiAnimId);
        confettiParticles = [];
      }

      const end = Date.now() + durationMs;

      function spawn() {
        if (Date.now() < end) {
          for (let i = 0; i < rate; i++) {
            confettiParticles.push(createParticle());
          }
          setTimeout(spawn, 30);
        }
      }

      spawn();
      tickConfetti();
    }

    /* =============================================================
       UI HELPERS
    ============================================================= */
    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      submitBtn.innerHTML = isLoading
        ? '<span class="spinner" aria-hidden="true"></span> Sending...'
        : 'Submit';
    }

    function showError(msg) {
      errorBox.textContent = '⚠️ ' + msg;
      errorBox.classList.add('visible');
      resultBox.classList.remove('visible');
    }

    function hideError() {
      errorBox.classList.remove('visible');
    }

    function showGreeting(message) {
      /*
        The backend returns e.g. "Hello, Alice!"
        We bold/highlight the name portion for a nicer look.
        Simple approach: replace the name part with a styled span.
      */
      greetingTxt.textContent = message; // safe plain-text first
      resultBox.classList.add('visible');
    }

    /* =============================================================
       FORM SUBMIT HANDLER
    ============================================================= */
    form.addEventListener('submit', async (event) => {
      event.preventDefault(); // prevent page reload
      hideError();

      const rawName = nameInput.value;

      // Client-side validation
      if (!rawName.trim()) {
        showError('Please enter your name before clicking the button!');
        nameInput.focus();
        return;
      }

      setLoading(true);
      resultBox.classList.remove('visible');

      try {
        /*
          POST /api/greet
          Body: { "name": "<entered name>" }
        */
        const response = await fetch(BACKEND_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: rawName })
        });

        if (!response.ok) {
          // Try to parse an error message from the backend
          let errMsg = `Server error (${response.status}). Is the backend running?`;
          try {
            const errData = await response.json();
            if (errData.message) errMsg = errData.message;
          } catch (_) { /* ignore parse errors */ }
          showError(errMsg);
          return;
        }

        const data = await response.json();  // { "message": "Hello, Alice!" }

        // Show the greeting
        showGreeting(data.message);

        // 🎉 Party time!
        launchConfetti(3500, 8);

      } catch (err) {
        // Network error (e.g. backend not running)
        showError(
          'Could not connect to the backend. ' +
          'It might be waking up (it takes ~30 seconds on the free tier after inactivity). ' +
          'Please try again in a moment!'
        );
        console.error('Fetch error:', err);
      } finally {
        setLoading(false);
      }
    });

    /* Allow pressing Enter in the input field */
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') form.requestSubmit();
    });
  </script>
</body>

</html>
